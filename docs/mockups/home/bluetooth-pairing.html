<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Bluetooth pairing</title>
  <link rel="stylesheet" href="../assets/mockup.css" />
</head>
<body>
  <div class="app-shell no-tabs">
    <header class="screen-header">
      <a class="icon-btn" href="empty.html" aria-label="Close">✕</a>
      <span class="title">Add device</span>
      <span class="icon-btn placeholder" aria-hidden="true">·</span>
    </header>

    <main class="content bluetooth-screen">
      <div class="bluetooth-logo" aria-hidden="true">⦿</div>
      <h1 style="font-size: 1.15rem; margin: 0 0 0.5rem;">Looking for devices…</h1>
      <p style="color: var(--text-muted); max-width: 280px; margin: 0 auto 2rem;">
        Keep your earphones in pairing mode. This screen is a mock; success returns to home with a device card.
      </p>
      <a class="btn-primary" href="populated.html" style="max-width: 280px; margin: 0 auto;">Simulate pairing success</a>
    </main>
  </div>
</body>
</html>
