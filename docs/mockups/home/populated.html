<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Home — My devices</title>
  <link rel="stylesheet" href="../assets/mockup.css" />
</head>
<body>
  <div class="app-shell">
    <header class="screen-header">
      <span class="icon-btn placeholder" aria-hidden="true">◀</span>
      <span class="brand">Aurora Audio</span>
      <a class="icon-btn" href="../settings/general.html" title="Settings" aria-label="Settings">⚙</a>
    </header>

    <main class="content">
      <div class="stats-row">
        <div class="stat-box">Connection<strong>Connected</strong></div>
        <div class="stat-box">Battery<strong>82%</strong></div>
      </div>
      <p class="section-title" style="margin-top: 0;">EQ preview</p>
      <div class="eq-preview" role="img" aria-label="Equalizer preview placeholder"></div>

      <h2 class="section-title">My devices</h2>
      <div class="card device-card">
        <div class="device-thumb" aria-hidden="true"></div>
        <div class="device-meta">
          <h3>Aurora Buds Pro</h3>
          <p class="status">● Connected</p>
          <p class="battery">Left 80% · Right 84% · Case 62%</p>
        </div>
      </div>

      <a class="add-device-cta" href="bluetooth-pairing.html" style="text-decoration: none; color: inherit; margin-top: 1rem;">
        <div class="plus" aria-hidden="true">+</div>
        <strong>Add Device</strong>
      </a>
    </main>

    <nav class="tab-bar" aria-label="Main">
      <a class="active" href="populated.html"><span class="tab-icon" aria-hidden="true">⌂</span>Home</a>
      <a href="../sound/equalizer.html"><span class="tab-icon" aria-hidden="true">♪</span>Sound</a>
      <a href="../noise/modes.html"><span class="tab-icon" aria-hidden="true">◎</span>Noise</a>
      <a href="../profile/overview.html"><span class="tab-icon" aria-hidden="true">👤</span>Profile</a>
    </nav>
  </div>
</body>
</html>
