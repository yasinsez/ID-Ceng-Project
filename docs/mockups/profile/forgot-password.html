<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Forgot password</title>
  <link rel="stylesheet" href="../assets/mockup.css" />
</head>
<body>
  <div class="app-shell">
    <header class="screen-header">
      <a class="icon-btn" href="login.html" aria-label="Back">◀</a>
      <span class="title">Forgot password</span>
      <span class="icon-btn" title="Settings" aria-label="Settings">⚙</span>
    </header>

    <main class="content" style="text-align: center;">
      <div class="profile-avatar" style="width: 72px; height: 72px; margin-bottom: 1.5rem;" aria-hidden="true"></div>

      <div class="card" style="text-align: left;">
        <div class="field">
          <label for="reset-email">Email</label>
          <input id="reset-email" type="email" placeholder="Account email" />
        </div>
        <button type="button" class="btn-primary">Send confirmation mail</button>
      </div>

      <p class="link-row"><a href="login.html">Back to login</a></p>
      <p class="mock-note">Wireframe: confirmation email sent; Done / cancel returns to login.</p>
    </main>

    <nav class="tab-bar" aria-label="Main">
      <a href="../home/empty.html"><span class="tab-icon" aria-hidden="true">⌂</span>Home</a>
      <a href="../sound/equalizer.html"><span class="tab-icon" aria-hidden="true">♪</span>Sound</a>
      <a href="../noise/modes.html"><span class="tab-icon" aria-hidden="true">◎</span>Noise</a>
      <a class="active" href="forgot-password.html"><span class="tab-icon" aria-hidden="true">👤</span>Profile</a>
    </nav>
  </div>
</body>
</html>
